<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>台中群英 · 血液活力深度探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --white: #FFFFFF;
    --pink: #FCA5A5;
    --pink-light: #FEE2E2;
    --pink-mid: #FECACA;
    --gray-dark: #374151;
    --gray-mid: #6B7280;
    --gray-light: #F9FAFB;
    --line-color: rgba(252, 165, 165, 0.4);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--white);
    color: var(--gray-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .serif { font-family: 'Noto Serif TC', serif; }
  .display { font-family: 'DM Serif Display', serif; }

  .screen {
    position: fixed; inset: 0;
    overflow-y: auto; overflow-x: hidden;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: translateY(20px);
  }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }

  .issue-label { font-size: 10px; letter-spacing: 0.25em; color: var(--pink); text-transform: uppercase; margin-bottom: 24px; }
  .cover-title { font-size: clamp(26px, 7vw, 36px); line-height: 1.4; text-align: center; color: var(--gray-dark); margin-bottom: 12px; }
  
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 40px; border: 0.5px solid var(--pink);
    background: transparent; color: var(--gray-dark);
    font-size: 13px; letter-spacing: 0.15em; cursor: pointer;
  }

  /* Quiz Style */
  .quiz-header { position: sticky; top: 0; background: white; z-index: 20; padding: 20px 24px; border-bottom: 0.5px solid var(--line-color); }
  .quiz-progress-bar { width: 100%; height: 1px; background: #F3F4F6; margin-top: 10px; }
  .quiz-progress-fill { height: 100%; background: var(--pink); transition: width 0.4s ease; }
  
  .quiz-body { padding: 20px 24px 120px; }
  .dimension-section { margin-bottom: 40px; }
  .dimension-title { font-size: 18px; font-weight: 300; margin-bottom: 16px; color: var(--gray-dark); border-left: 2px solid var(--pink); padding-left: 12px; }
  
  .question-item { padding: 18px 0; border-bottom: 0.5px solid #F3F4F6; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .q-text { font-size: 14px; line-height: 1.6; color: var(--gray-mid); transition: color 0.3s; }
  .question-item.checked .q-text { color: var(--gray-dark); font-weight: 400; }
  
  .q-checkbox { width: 18px; height: 18px; border: 0.5px solid #D1D5DB; border-radius: 50%; flex-shrink: 0; margin-top: 2px; position: relative; }
  .question-item.checked .q-checkbox { border-color: var(--pink); background: var(--pink-light); }
  .question-item.checked .q-checkbox::after { content: ''; position: absolute; inset: 4px; background: var(--pink); border-radius: 50%; }

  .quiz-footer { position: relative; padding: 24px; text-align: center; background: white; }
  .btn-submit { width: 100%; padding: 16px; background: var(--gray-dark); color: white; letter-spacing: 0.1em; font-size: 14px; }

  /* Result Style */
  .result-card { background: var(--gray-light); padding: 24px; border-radius: 4px; margin-bottom: 24px; }
  .tag-level { font-size: 10px; padding: 2px 8px; border-radius: 100px; display: inline-block; margin-bottom: 8px; }
  .level-low { background: #E5E7EB; color: #6B7280; }
  .level-mid { background: #FEE2E2; color: #EF4444; }
  .level-high { background: #FECACA; color: #B91C1C; }

  .btn-cta { display: block; width: 100%; padding: 18px; background: var(--pink); color: white; text-align: center; text-decoration: none; margin-top: 32px; border-radius: 2px; }
</style>
</head>
<body>

<div id="screen-cover" class="screen active flex flex-col justify-center items-center p-8">
  <p class="issue-label">Taichung Quanying · Health Check</p>
  <h1 class="cover-title serif">台中群英<br>血液活力深度探索</h1>
  <p class="text-xs text-gray-400 tracking-widest mb-12">血液循環健康小測驗</p>
  <button class="btn-primary" onclick="showScreen('screen-quiz')">開始檢測 →</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="flex justify-between items-center text-[10px] tracking-widest text-gray-400">
      <span>BLOOD VITALITY DIAGNOSTIC</span>
      <span id="progress-text">0 / 15</span>
    </div>
    <div class="quiz-progress-bar"><div id="progress-fill" class="quiz-progress-fill" style="width: 0%"></div></div>
  </div>

  <div class="quiz-body" id="quiz-container">
    </div>

  <div class="quiz-footer">
    <button class="btn-submit" onclick="submitQuiz()">查看分析報告 →</button>
  </div>
</div>

<div id="screen-result" class="screen p-6">
  <div class="text-center mb-10">
    <p class="issue-label">Diagnostic Report</p>
    <h2 class="serif text-2xl mb-2">測驗結果報告</h2>
    <p id="overall-status" class="text-sm text-gray-500"></p>
  </div>

  <div id="dimension-results">
    </div>

  <div class="result-card mt-8">
    <h3 class="serif text-lg mb-4">綜合保養建議</h3>
    <p id="overall-advice" class="text-sm leading-relaxed text-gray-600"></p>
  </div>

  <div class="voucher-section text-center py-8 border-t border-dashed border-gray-200">
    <p class="text-[10px] tracking-widest text-pink-400 mb-4">專屬數位體驗憑證</p>
    <div class="border border-pink-200 p-6 bg-white relative">
      <h4 class="serif text-lg">氦氖雷射方案</h4>
      <p class="text-[10px] text-gray-400 mb-4">BLOOD VITALITY PASS</p>
      <div class="h-[0.5px] bg-pink-100 my-4"></div>
      <p class="text-xs text-gray-500">請憑此頁面與醫師諮詢</p>
      <p class="text-[10px] text-gray-300 mt-2" id="voucher-id">ID: TC-0000</p>
    </div>
    <a href="https://line.me/R/oaMessage/@04-23029880/?我已經完成健康測驗" class="btn-cta">領取我的氦氖雷射方案</a>
    <p class="text-[10px] text-gray-300 mt-6" onclick="location.reload()">重新測驗 ↺</p>
  </div>
</div>

<script>
const questions = [
  { dim: 'A', text: '昨晚明明睡很久，但起床後還是覺得全身沈重？' },
  { dim: 'A', text: '下午三、四點常覺得腦袋空空的，無法集中精神？' },
  { dim: 'A', text: '以前工作一整天都沒事，現在到中午就覺得體力耗盡？' },
  { dim: 'A', text: '每天早上一定要靠兩杯以上黑咖啡才能「開機」？' },
  { dim: 'A', text: '身體長時間處於緊繃狀態，就算休息也覺得心情焦躁？' },
  { dim: 'B', text: '待在冷氣房或冬天，手腳總像冰棒一樣難以回溫？' },
  { dim: 'B', text: '坐久或站久了，常覺得小腿沈重、發脹？' },
  { dim: 'B', text: '照鏡子時發現臉色蠟黃、暗沈，缺乏紅潤感？' },
  { dim: 'B', text: '偶爾會覺得指尖或腳底有輕微的麻木感？' },
  { dim: 'B', text: '改變姿勢（如起身）時，常覺得頭暈、血液跟不上？' },
  { dim: 'C', text: '皮膚上的小刮傷或瘀青，都要拖很久才會消失？' },
  { dim: 'C', text: '身體常有小毛病，如反覆長痘、牙齦腫或嘴角破？' },
  { dim: 'C', text: '吃稍微鹹一點或累一點，隔天起床臉部就明顯浮腫？' },
  { dim: 'C', text: '周遭只要有人感冒就躲不掉，或換季過敏變頻繁？' },
  { dim: 'C', text: '覺得身體代謝變差，排便或排汗似乎都不太順暢？' }
];

const quizContainer = document.getElementById('quiz-container');
let scores = { A: 0, B: 0, C: 0 };
let totalChecked = 0;

// Render Questions
const dims = { A: '疲勞維度', B: '循環維度', C: '修復維度' };
Object.keys(dims).forEach(dim => {
  const section = document.createElement('div');
  section.className = 'dimension-section';
  section.innerHTML = `<h3 class="dimension-title serif">${dims[dim]}</h3>`;
  
  questions.filter(q => q.dim === dim).forEach((q, idx) => {
    const item = document.createElement('div');
    item.className = 'question-item';
    item.innerHTML = `<div class="q-text">No.${idx+1} ${q.text}</div><div class="q-checkbox"></div>`;
    item.onclick = () => {
      item.classList.toggle('checked');
      const isChecked = item.classList.contains('checked');
      scores[q.dim] += isChecked ? 1 : -1;
      totalChecked += isChecked ? 1 : -1;
      updateProgress();
    };
    section.appendChild(item);
  });
  quizContainer.appendChild(section);
});

function updateProgress() {
  const pct = (totalChecked / 15) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').innerText = `${totalChecked} / 15`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function getLevel(s) {
  if (s >= 4) return { label: '高度需求', class: 'level-high' };
  if (s >= 2) return { label: '中度需求', class: 'level-mid' };
  return { label: '輕微需求', class: 'level-low' };
}

function submitQuiz() {
  const resContainer = document.getElementById('dimension-results');
  resContainer.innerHTML = '';
  
  const analysis = {
    A: {
      title: '疲勞維度分析',
      advice: [
        '目前狀態穩定，請繼續保持優質睡眠與規律作息。',
        '身體開始累積隱性疲勞，建議睡前減少藍光，多補充水分與 B 群。若想深層修復，可與醫師討論氦氖雷射方案。',
        '電力明顯不足。除了調整作息，建議諮詢醫師了解氦氖雷射與點滴輔助。'
      ]
    },
    B: {
      title: '循環維度分析',
      advice: [
        '循環機能良好，建議透過日常拉伸維持經絡通暢。',
        '末梢循環略顯遲滯，建議養成泡澡或溫水泡腳習慣。若冰冷感明顯，可與醫師討論氦氖雷射方案。',
        '體內「物流」嚴重塞車。除了規律運動，建議諮詢專業醫師了解氦氖雷射對改善循環的幫助，並討論是否需要點滴輔助。'
      ]
    },
    C: {
      title: '修復維度分析',
      advice: [
        '自癒力維持得不錯，請保持均衡飲食。',
        '身體修復速度略微減緩，建議補充維生素 C 與優質蛋白。若常有小發炎，可諮詢醫師了解氦氖雷射方案或點滴輔助。',
        '身體修復系統正處於超載狀態。建議諮詢醫師，透過氦氖雷射或高壓氧等療程來輔助找回平衡。'
      ]
    }
  };

  Object.keys(scores).forEach(d => {
    const level = getLevel(scores[d]);
    const adviceIdx = scores[d] >= 4 ? 2 : (scores[d] >= 2 ? 1 : 0);
    resContainer.innerHTML += `
      <div class="mb-6">
        <span class="tag-level ${level.class}">${level.label}</span>
        <h4 class="font-medium mb-2">${analysis[d].title}</h4>
        <p class="text-sm text-gray-600 leading-relaxed">${analysis[d].advice[adviceIdx]}</p>
      </div>
    `;
  });

  // Overall Result
  let statusText = '';
  let overallAdvice = '';
  if (totalChecked >= 11) {
    statusText = '狀態略顯疲憊，建議尋求專業諮詢';
    overallAdvice = '您的各項維度總分較高，這表示身體目前的「自癒」與「循環」機制可能正處於低迷狀態。除了多休息，建議您可以預約諮詢，由醫師評估氦氖雷射或高壓氧等輔助療程，幫助身體找回原本的活力。';
  } else if (totalChecked >= 6) {
    statusText = '身體開始發出微小訊號，請留意作息';
    overallAdvice = '目前的狀態屬於過度期，身體雖然還能應付日常，但疲勞感已開始累積。建議增加深層睡眠的時間，並適度進行輕度運動。若想更積極保養，建議您可以預約諮詢，由醫師評估點滴輔助或氦氖雷射，都是不錯的選擇。';
  } else {
    statusText = '目前狀態穩定，請繼續保持！';
    overallAdvice = '太棒了！您的身體指標目前非常健康。建議繼續維持均衡飲食與規律運動。若想長期維持這種輕盈感，可與醫師討論是否將氦氖雷射作為輔助的保養方法。';
  }

  document.getElementById('overall-status').innerText = statusText;
  document.getElementById('overall-advice').innerText = overallAdvice;
  document.getElementById('voucher-id').innerText = `ID: TC-${Math.floor(1000 + Math.random() * 9000)}`;
  
  showScreen('screen-result');
}
</script>
</body>
</html>
